services:
    fastapi:
        build:
            context: .
            dockerfile: IaC/flask/Dockerfile
        ports:
            - "${FASTAPIPORT:-8000:8000}"
            - "5914:5914"
        container_name: "${FASTAPINAME:-fastapi-app}"
        volumes:
            - .:/code
        restart: always
        networks:
            - kallaf
        environment:
            # Hostname `mongo` é o nome do serviço na rede Compose (não use container_name aqui).
            # authSource=admin alinha com root user do image oficial e com MongoDBConnector.
            - MONGO_URI=mongodb://${MONGOUSER}:${MONGOPASSWORD}@mongo:27017/${MONGODB}?authSource=admin
            # Fuso horário (IANA). Afeta Chrome/WhatsApp Web e timestamps do sistema. Defina `TZ` no `.env`.
            - TZ=${TZ:-UTC}
        env_file:
            - .env
        depends_on:
            mongo:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy

    mongo:
        image: mongo:4.4
        container_name: "${MONGONAME}"
        restart: always
        ports:
            - "27017:27017"
        environment:
            - MONGO_INITDB_ROOT_USERNAME=${MONGOUSER:-admin}
            - MONGO_INITDB_ROOT_PASSWORD=${MONGOPASSWORD:-admin123}
        volumes:
            - mongo_data:/data/db
        networks:
            - kallaf
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    'mongo --quiet -u "$$MONGO_INITDB_ROOT_USERNAME" -p "$$MONGO_INITDB_ROOT_PASSWORD" --authenticationDatabase admin --eval "db.adminCommand(\"ping\")" || exit 1',
                ]
            interval: 5s
            timeout: 5s
            retries: 6
            start_period: 15s

    rabbitmq:
        build:
            context: .
            dockerfile: IaC/technologies/rabbitmq/Dockerfile
        container_name: "${RABBITMQNAME:-rabbitmq}"
        restart: always
        ports:
            - "5672:5672"
            - "15672:15672"
        environment:
            - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-admin}
            - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS:-admin123}
        healthcheck:
            test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
            interval: 10s
            timeout: 5s
            retries: 8
            start_period: 20s
        networks:
            - kallaf

volumes:
    mongo_data:

networks:
    kallaf:
        driver: bridge
