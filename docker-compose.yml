services:
    fastapi:
        build:
            context: .
            dockerfile: IaC/flask/Dockerfile
        ports:
            - "${FASTAPIPORT:-8000:8000}"
            - "5914:5914"
        container_name: "${FASTAPINAME:-fastapi-app}"
        volumes:
            - .:/code
        restart: always
        networks:
            - kallaf
        environment:
            # Hostname `mongo` é o nome do serviço na rede Compose (não use container_name aqui).
            # authSource=admin alinha com root user do image oficial e com MongoDBConnector.
            - MONGO_URI=mongodb://${MONGOUSER}:${MONGOPASSWORD}@mongo:27017/${MONGODB}?authSource=admin
        env_file:
            - .env
        depends_on:
            mongo:
                condition: service_healthy

    mongo:
        image: mongo:4.4
        container_name: "${MONGONAME}"
        restart: always
        ports:
            - "27017:27017"
        environment:
            - MONGO_INITDB_ROOT_USERNAME=${MONGOUSER}
            - MONGO_INITDB_ROOT_PASSWORD=${MONGOPASSWORD}
        volumes:
            - mongo_data:/data/db
        networks:
            - kallaf
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    'mongo --quiet -u "$$MONGO_INITDB_ROOT_USERNAME" -p "$$MONGO_INITDB_ROOT_PASSWORD" --authenticationDatabase admin --eval "db.adminCommand(\"ping\")" || exit 1',
                ]
            interval: 5s
            timeout: 5s
            retries: 6
            start_period: 15s

volumes:
    mongo_data:

networks:
    kallaf:
        driver: bridge
