<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}WhatsApp Bot API{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/app.css">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="top-nav">
        <div class="nav-inner">
            <a class="nav-brand" href="/">WhatsApp Bot API</a>
            <button class="nav-toggle" type="button" aria-label="Abrir menu" onclick="toggleNavMenu()">&#9776;</button>
            <div class="nav-menu" id="navMenu">
                <a class="nav-link{% if active_nav == 'home' %} active{% endif %}" href="/">Home</a>
                <a class="nav-link{% if active_nav == 'triggers' %} active{% endif %}" href="/triggers">Triggers</a>
                <a class="nav-link" href="/docs" target="_blank">Swagger</a>
                <button id="btnRestartContainer" class="btn-danger" type="button" onclick="restartContainer()">Reiniciar Container</button>
            </div>
        </div>
    </nav>

    <div id="restartContainerResult" class="nav-toast" style="display: none;"></div>

    <div class="page-wrap">
        {% block content %}{% endblock %}
    </div>

    <script>
    function toggleNavMenu() {
        document.getElementById('navMenu').classList.toggle('open');
    }

    function restartContainer() {
        if (!confirm('Tem certeza que deseja reiniciar o container? A API ficará indisponível por alguns segundos.')) {
            return;
        }
        const btn = document.getElementById('btnRestartContainer');
        const resultDiv = document.getElementById('restartContainerResult');
        btn.disabled = true;
        btn.textContent = 'Reiniciando...';
        fetch('/restartContainer', { method: 'POST' })
            .then(response => response.json())
            .then(data => {
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = '<div class="result">' + (data.message || JSON.stringify(data, null, 2)) + '</div>';
            })
            .catch(() => {
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = '<div class="result">Container reiniciando... aguarde alguns segundos e recarregue a página.</div>';
            });
    }
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
